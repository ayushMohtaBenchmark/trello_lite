openapi: 3.0.3
info:
  title: Trello-Lite API
  version: "1.0.0"
  description: >
    A multi-user project board (Trello-lite) JSON API. Authentication is via
    short-lived JWT access tokens paired with rotating refresh tokens.
    Collections are paginated (page metadata in response headers) and the API is
    rate limited. Boards own lists, lists own cards, and cards carry comments,
    labels, assignees and file attachments. Boards can register outbound,
    HMAC-signed webhooks.
  contact:
    name: Trello-Lite
servers:
  - url: http://localhost:3000
    description: Local development
  - url: https://api.trello-lite.example.com
    description: Production

tags:
  - name: Auth
  - name: Boards
  - name: Memberships
  - name: Lists
  - name: Cards
  - name: Comments
  - name: Labels
  - name: Attachments
  - name: Webhooks
  - name: Activities

security:
  - bearerAuth: []

paths:
  /api/v1/auth/register:
    post:
      tags: [Auth]
      summary: Register a new user and receive tokens
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [user]
              properties:
                user:
                  type: object
                  required: [name, email, password]
                  properties:
                    name: { type: string, example: Ada Lovelace }
                    email: { type: string, format: email, example: ada@example.com }
                    password: { type: string, format: password, minLength: 8 }
      responses:
        "201": { $ref: "#/components/responses/AuthSuccess" }
        "422": { $ref: "#/components/responses/ValidationError" }

  /api/v1/auth/login:
    post:
      tags: [Auth]
      summary: Exchange credentials for tokens
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [user]
              properties:
                user:
                  type: object
                  required: [email, password]
                  properties:
                    email: { type: string, format: email }
                    password: { type: string, format: password }
      responses:
        "200": { $ref: "#/components/responses/AuthSuccess" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /api/v1/auth/refresh:
    post:
      tags: [Auth]
      summary: Rotate a refresh token for a new access/refresh pair
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refresh_token]
              properties:
                refresh_token: { type: string }
      responses:
        "200": { $ref: "#/components/responses/Tokens" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /api/v1/auth/logout:
    delete:
      tags: [Auth]
      summary: Revoke a refresh token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refresh_token]
              properties:
                refresh_token: { type: string }
      responses:
        "204": { description: Logged out }

  /api/v1/auth/me:
    get:
      tags: [Auth]
      summary: Current authenticated user
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/User" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /api/v1/boards:
    get:
      tags: [Boards]
      summary: List boards visible to the current user
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PerPage"
      responses:
        "200":
          description: OK
          headers:
            X-Total-Count: { $ref: "#/components/headers/XTotalCount" }
            Link: { $ref: "#/components/headers/Link" }
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Board" }
        "401": { $ref: "#/components/responses/Unauthorized" }
    post:
      tags: [Boards]
      summary: Create a board (caller becomes owner/admin)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [board]
              properties:
                board: { $ref: "#/components/schemas/BoardInput" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Board" }
        "422": { $ref: "#/components/responses/ValidationError" }

  /api/v1/boards/{id}:
    parameters:
      - $ref: "#/components/parameters/Id"
    get:
      tags: [Boards]
      summary: Fetch a board
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Board" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
    patch:
      tags: [Boards]
      summary: Update a board (admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                board: { $ref: "#/components/schemas/BoardInput" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Board" }
        "403": { $ref: "#/components/responses/Forbidden" }
    delete:
      tags: [Boards]
      summary: Delete a board (owner only)
      responses:
        "204": { description: Deleted }
        "403": { $ref: "#/components/responses/Forbidden" }

  /api/v1/boards/{board_id}/memberships:
    parameters:
      - $ref: "#/components/parameters/BoardId"
    get:
      tags: [Memberships]
      summary: List board members
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Membership" }
    post:
      tags: [Memberships]
      summary: Add a member by email (admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [membership]
              properties:
                membership:
                  type: object
                  required: [email]
                  properties:
                    email: { type: string, format: email }
                    role: { $ref: "#/components/schemas/MembershipRole" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Membership" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  /api/v1/boards/{board_id}/memberships/{id}:
    parameters:
      - $ref: "#/components/parameters/BoardId"
      - $ref: "#/components/parameters/Id"
    patch:
      tags: [Memberships]
      summary: Change a member's role (admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                membership:
                  type: object
                  properties:
                    role: { $ref: "#/components/schemas/MembershipRole" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Membership" }
    delete:
      tags: [Memberships]
      summary: Remove a member (admin only)
      responses:
        "204": { description: Removed }

  /api/v1/boards/{board_id}/lists:
    parameters:
      - $ref: "#/components/parameters/BoardId"
    get:
      tags: [Lists]
      summary: List a board's lists (ordered)
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PerPage"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/List" }
    post:
      tags: [Lists]
      summary: Create a list
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [list]
              properties:
                list:
                  type: object
                  required: [name]
                  properties:
                    name: { type: string }
                    position: { type: integer }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/List" }

  /api/v1/lists/{id}:
    parameters:
      - $ref: "#/components/parameters/Id"
    get:
      tags: [Lists]
      summary: Fetch a list
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/List" }
    patch:
      tags: [Lists]
      summary: Update a list
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                list:
                  type: object
                  properties:
                    name: { type: string }
                    position: { type: integer }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/List" }
    delete:
      tags: [Lists]
      summary: Delete a list
      responses:
        "204": { description: Deleted }

  /api/v1/lists/{list_id}/cards:
    parameters:
      - $ref: "#/components/parameters/ListId"
    get:
      tags: [Cards]
      summary: List a list's cards (ordered)
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PerPage"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Card" }
    post:
      tags: [Cards]
      summary: Create a card
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [card]
              properties:
                card: { $ref: "#/components/schemas/CardInput" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Card" }

  /api/v1/cards/{id}:
    parameters:
      - $ref: "#/components/parameters/Id"
    get:
      tags: [Cards]
      summary: Fetch a card
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Card" }
    patch:
      tags: [Cards]
      summary: Update a card (labels/assignees via label_ids / assignee_ids)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                card: { $ref: "#/components/schemas/CardInput" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Card" }
    delete:
      tags: [Cards]
      summary: Delete a card
      responses:
        "204": { description: Deleted }

  /api/v1/cards/{id}/move:
    parameters:
      - $ref: "#/components/parameters/Id"
    patch:
      tags: [Cards]
      summary: Move/reorder a card within or across lists
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [position]
              properties:
                list_id: { type: integer, description: Target list (defaults to current) }
                position: { type: integer, minimum: 1, description: 1-based slot }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Card" }

  /api/v1/cards/{card_id}/comments:
    parameters:
      - $ref: "#/components/parameters/CardId"
    get:
      tags: [Comments]
      summary: List comments on a card
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Comment" }
    post:
      tags: [Comments]
      summary: Add a comment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [comment]
              properties:
                comment:
                  type: object
                  required: [body]
                  properties:
                    body: { type: string }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Comment" }

  /api/v1/comments/{id}:
    parameters:
      - $ref: "#/components/parameters/Id"
    patch:
      tags: [Comments]
      summary: Edit a comment (author or admin)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                comment:
                  type: object
                  properties:
                    body: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Comment" }
    delete:
      tags: [Comments]
      summary: Delete a comment (author or admin)
      responses:
        "204": { description: Deleted }

  /api/v1/boards/{board_id}/labels:
    parameters:
      - $ref: "#/components/parameters/BoardId"
    get:
      tags: [Labels]
      summary: List board labels
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Label" }
    post:
      tags: [Labels]
      summary: Create a label (admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [label]
              properties:
                label:
                  type: object
                  required: [name]
                  properties:
                    name: { type: string }
                    color: { type: string, example: "#e53935" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Label" }

  /api/v1/boards/{board_id}/labels/{id}:
    parameters:
      - $ref: "#/components/parameters/BoardId"
      - $ref: "#/components/parameters/Id"
    patch:
      tags: [Labels]
      summary: Update a label (admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                label:
                  type: object
                  properties:
                    name: { type: string }
                    color: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Label" }
    delete:
      tags: [Labels]
      summary: Delete a label (admin only)
      responses:
        "204": { description: Deleted }

  /api/v1/cards/{card_id}/attachments:
    parameters:
      - $ref: "#/components/parameters/CardId"
    get:
      tags: [Attachments]
      summary: List a card's attachments
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Attachment" }
    post:
      tags: [Attachments]
      summary: Upload a file to a card (multipart)
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file: { type: string, format: binary }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Attachment" }

  /api/v1/attachments/{id}:
    parameters:
      - $ref: "#/components/parameters/Id"
    delete:
      tags: [Attachments]
      summary: Delete an attachment
      responses:
        "204": { description: Deleted }

  /api/v1/boards/{board_id}/webhooks:
    parameters:
      - $ref: "#/components/parameters/BoardId"
    get:
      tags: [Webhooks]
      summary: List board webhooks (admin only)
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Webhook" }
    post:
      tags: [Webhooks]
      summary: Register a webhook (admin only). Secret returned once.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [webhook]
              properties:
                webhook: { $ref: "#/components/schemas/WebhookInput" }
      responses:
        "201":
          description: Created (includes one-time `secret`)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Webhook" }

  /api/v1/webhooks/{id}:
    parameters:
      - $ref: "#/components/parameters/Id"
    get:
      tags: [Webhooks]
      summary: Fetch a webhook (admin only)
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Webhook" }
    patch:
      tags: [Webhooks]
      summary: Update a webhook (admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                webhook: { $ref: "#/components/schemas/WebhookInput" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Webhook" }
    delete:
      tags: [Webhooks]
      summary: Delete a webhook (admin only)
      responses:
        "204": { description: Deleted }

  /api/v1/boards/{board_id}/activities:
    parameters:
      - $ref: "#/components/parameters/BoardId"
    get:
      tags: [Activities]
      summary: Board activity feed (most recent first)
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PerPage"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Activity" }

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    Id:
      name: id
      in: path
      required: true
      schema: { type: integer }
    BoardId:
      name: board_id
      in: path
      required: true
      schema: { type: integer }
    ListId:
      name: list_id
      in: path
      required: true
      schema: { type: integer }
    CardId:
      name: card_id
      in: path
      required: true
      schema: { type: integer }
    Page:
      name: page
      in: query
      required: false
      schema: { type: integer, minimum: 1, default: 1 }
    PerPage:
      name: per_page
      in: query
      required: false
      schema: { type: integer, minimum: 1, maximum: 100, default: 25 }

  headers:
    XTotalCount:
      description: Total number of records across all pages
      schema: { type: integer }
    Link:
      description: RFC-5988 pagination links (next, prev, first, last)
      schema: { type: string }

  schemas:
    User:
      type: object
      properties:
        id: { type: integer }
        name: { type: string }
        email: { type: string, format: email }
        role: { type: string, enum: [member, admin] }
        created_at: { type: string, format: date-time }

    MembershipRole:
      type: string
      enum: [admin, member, viewer]

    Membership:
      type: object
      properties:
        id: { type: integer }
        board_id: { type: integer }
        role: { $ref: "#/components/schemas/MembershipRole" }
        created_at: { type: string, format: date-time }
        user: { $ref: "#/components/schemas/User" }

    BoardInput:
      type: object
      properties:
        name: { type: string }
        description: { type: string }
        visibility: { type: string, enum: [private, public] }

    Board:
      type: object
      properties:
        id: { type: integer }
        name: { type: string }
        description: { type: string, nullable: true }
        visibility: { type: string, enum: [private, public] }
        owner_id: { type: integer }
        my_role: { type: string, nullable: true, enum: [admin, member, viewer] }
        owner: { $ref: "#/components/schemas/User" }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    List:
      type: object
      properties:
        id: { type: integer }
        board_id: { type: integer }
        name: { type: string }
        position: { type: integer }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    CardInput:
      type: object
      properties:
        title: { type: string }
        description: { type: string }
        position: { type: integer }
        due_on: { type: string, format: date-time, nullable: true }
        archived: { type: boolean }
        label_ids:
          type: array
          items: { type: integer }
        assignee_ids:
          type: array
          items: { type: integer }

    Card:
      type: object
      properties:
        id: { type: integer }
        list_id: { type: integer }
        board_id: { type: integer }
        title: { type: string }
        description: { type: string, nullable: true }
        position: { type: integer }
        due_on: { type: string, format: date-time, nullable: true }
        archived: { type: boolean }
        creator_id: { type: integer }
        labels:
          type: array
          items: { $ref: "#/components/schemas/Label" }
        assignees:
          type: array
          items: { $ref: "#/components/schemas/User" }
        attachments:
          type: array
          items: { $ref: "#/components/schemas/Attachment" }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    Comment:
      type: object
      properties:
        id: { type: integer }
        card_id: { type: integer }
        body: { type: string }
        user: { $ref: "#/components/schemas/User" }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    Label:
      type: object
      properties:
        id: { type: integer }
        board_id: { type: integer }
        name: { type: string }
        color: { type: string }

    Attachment:
      type: object
      properties:
        id: { type: integer }
        filename: { type: string }
        content_type: { type: string }
        byte_size: { type: integer }
        url: { type: string }

    WebhookInput:
      type: object
      properties:
        url: { type: string, format: uri }
        active: { type: boolean }
        event_types:
          type: array
          items:
            type: string
            enum:
              - card.created
              - card.updated
              - card.moved
              - card.archived
              - comment.created
              - list.created
              - list.updated

    Webhook:
      type: object
      properties:
        id: { type: integer }
        board_id: { type: integer }
        url: { type: string }
        event_types:
          type: array
          items: { type: string }
        active: { type: boolean }
        secret: { type: string, nullable: true, description: Returned only on create }
        created_at: { type: string, format: date-time }

    Activity:
      type: object
      properties:
        id: { type: integer }
        board_id: { type: integer }
        user_id: { type: integer, nullable: true }
        action: { type: string }
        subject_type: { type: string, nullable: true }
        subject_id: { type: integer, nullable: true }
        metadata: { type: object }
        created_at: { type: string, format: date-time }

    Tokens:
      type: object
      properties:
        access_token: { type: string }
        refresh_token: { type: string }
        token_type: { type: string, example: Bearer }
        expires_in: { type: integer, example: 1800 }

    AuthResult:
      allOf:
        - $ref: "#/components/schemas/Tokens"
        - type: object
          properties:
            user: { $ref: "#/components/schemas/User" }

    Error:
      type: object
      properties:
        error:
          type: object
          properties:
            code: { type: string }
            message: { type: string }
            details:
              type: object
              additionalProperties:
                type: array
                items: { type: string }

  responses:
    Tokens:
      description: Token pair
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Tokens" }
    AuthSuccess:
      description: Authenticated user with tokens
      content:
        application/json:
          schema: { $ref: "#/components/schemas/AuthResult" }
    Unauthorized:
      description: Missing or invalid credentials
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
    Forbidden:
      description: Authenticated but not permitted
